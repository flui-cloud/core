apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ISSUER_NAME}}
  labels:
    managed-by: flui-cloud
spec:
  acme:
    server: {{ACME_SERVER}}
    email: {{ACME_EMAIL}}
    privateKeySecretRef:
      name: {{PRIVATE_KEY_SECRET_REF}}
    solvers:
      - dns01:
          webhook:
            groupName: {{WEBHOOK_GROUP_NAME}}
            solverName: {{WEBHOOK_SOLVER_NAME}}
            config:
              tokenSecretKeyRef:
                name: {{WEBHOOK_SECRET_NAME}}
                key: {{WEBHOOK_SECRET_KEY}}
