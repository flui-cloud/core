apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{CERT_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    managed-by: flui-cloud
    flui-resource-type: wildcard-certificate
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
spec:
  secretName: {{SECRET_NAME}}
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
  issuerRef:
    name: {{ISSUER_NAME}}
    kind: ClusterIssuer
  dnsNames:
    - "*.{{ZONE_NAME}}"
