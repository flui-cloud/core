kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: stirling-pdf
  name: Stirling-PDF
  description: >
    Locally-hosted PDF toolkit with 50+ operations: merge, split, convert,
    compress, OCR, watermark, sign and more. Files never leave your server,
    making it ideal for processing sensitive documents under GDPR.
  appKind: TOOL
  category: document-management
  tags:
    - pdf
    - ocr
    - privacy
    - document-processing
  license: MIT
  version: "2.9.2"
  maintainedAt: "2026-04-19"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/stirling-pdf.svg
  links:
    website: https://stirlingpdf.com
    docs: https://docs.stirlingpdf.com
    source: https://github.com/Stirling-Tools/Stirling-PDF
  ratings:
    wow: 4
    utility: 5
    euFit: 5
    community: 5
  alternativeTo:
    - ILovePDF
    - Smallpdf
    - Adobe Acrobat

spec:
  type: standalone
  privatizable: true

  # Major bump from 0.34 → 2.x (upstream jumped to v2 series in 2026).
  # The /actuator/health path below was verified against 2.9 via kubectl exec.
  image:
    registry: docker.io
    repository: stirlingtools/stirling-pdf
    tag: "2.9.2"

  ports:
    - name: http
      internal: 8080
      expose: true
      protocol: http

  volumes:
    - name: configs
      mountPath: /configs
      required: true
      size: 1Gi
    - name: tessdata
      mountPath: /usr/share/tessdata
      required: true
      size: 1Gi

  env:
    - name: SYSTEM_DEFAULTLOCALE
      value: "en-GB"
      userEditable: true
      description: Default interface locale (e.g. en-GB, it-IT, fr-FR)
    - name: SECURITY_ENABLELOGIN
      value: "false"
      userEditable: true
      description: Enable the built-in login (set true if you want Stirling's native auth instead of the Flui proxy)

  # Production Deployment Guide recommends: 2GB minimum, 4GB+ recommended,
  # 2 CPU cores. See https://docs.stirlingpdf.com/Production-Deployment-Guide/
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: "1"
          max: "4"
        memory:
          min: 2Gi
          max: 8Gi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  # Spring Boot Actuator /actuator/health — the official Production Deployment
  # Guide mentions /api/v1/health but that endpoint doesn't exist in the
  # current image (0.34) and its GlobalExceptionHandler converts the resulting
  # NoResourceFoundException into HTTP 500, making the probe perpetually fail.
  # /actuator/health is the Spring Boot Actuator standard, returns 200 with
  # {"status":"UP"} once the app is ready. Verified via exec + curl inside
  # the pod. Spring Boot cold start ~60-120s, hence initialDelay 90s.
  healthcheck:
    type: http
    path: /actuator/health
    port: 8080
    initialDelay: 90s
    interval: 30s
    timeout: 10s
    retries: 5

  domain:
    auto: true
    userCustomizable: true
    tls: true

  auth:
    mode: native
