kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: memos
  name: Memos
  description: >
    Lightweight, privacy-first note-taking service with a Twitter-like
    timeline. Markdown-native, fully self-hosted, data stored in a single
    SQLite file. Perfect for quick capture of thoughts and daily logs.
  appKind: APPLICATION
  category: productivity
  tags:
    - notes
    - markdown
    - privacy
    - knowledge-base
  license: MIT
  version: "0.27"
  maintainedAt: "2026-04-19"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/memos.svg
  links:
    website: https://usememos.com
    docs: https://usememos.com/docs
    source: https://github.com/usememos/memos
  ratings:
    wow: 4
    utility: 4
    euFit: 5
    community: 5
  alternativeTo:
    - Twitter
    - Evernote Lite

spec:
  type: standalone
  privatizable: true

  image:
    registry: docker.io
    repository: neosmemo/memos
    tag: "0.27"

  ports:
    - name: http
      internal: 5230
      expose: true
      protocol: http

  volumes:
    - name: data
      mountPath: /var/opt/memos
      required: true
      size: 2Gi

  env: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 50m
          max: "1"
        memory:
          min: 64Mi
          max: 512Mi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /healthz
    port: 5230
    interval: 30s
    timeout: 5s
    retries: 3

  domain:
    auto: true
    userCustomizable: true
    tls: true

  auth:
    mode: native
