kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: mongo-express
  name: mongo-express
  draft: true
  description: >
    Lightweight web-based admin UI for FerretDB (MongoDB-compatible). Install
    on top of a running Flui FerretDB instance: the connection string is wired
    from FerretDB's K8s Secret via secretKeyRef, credentials never pass through
    the dashboard. Browse collections, run queries, and inspect documents from
    the browser.
  appKind: TOOL
  category: database-tools
  tags:
    - ferretdb
    - mongodb
    - web-client
    - admin
    - document-db
  license: MIT
  version: "1"
  maintainedAt: "2026-04-24"
  clientFor:
    - ferretdb
  clientDefaultFor:
    - ferretdb
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/mongodb.svg
  links:
    website: https://github.com/mongo-express/mongo-express
    docs: https://github.com/mongo-express/mongo-express#readme
    source: https://github.com/mongo-express/mongo-express
  ratings:
    wow: 3
    utility: 5
    euFit: 4
    community: 4
  alternativeTo:
    - MongoDB Compass
    - Studio 3T
    - NoSQLBooster

spec:
  type: standalone

  exposure: internal

  image:
    registry: docker.io
    repository: library/mongo-express
    tag: "1"

  ports:
    - name: http
      internal: 8081
      expose: true
      protocol: http

  env:
    - name: ME_CONFIG_MONGODB_URL
      value: ""
      description: Composed at runtime by startCommand from MONGO_HOST/MONGO_PORT
    - name: ME_CONFIG_BASICAUTH
      value: "false"
      description: Disable mongo-express's own basic auth — Flui's ForwardAuth proxy already gates access to the dashboard.
    - name: ME_CONFIG_MONGODB_ENABLE_ADMIN
      value: "true"

  linkedBuildingBlocks:
    - ref: ferretdb
      envMapping:
        - name: MONGO_HOST
          fromService: host
        - name: MONGO_PORT
          fromService: port

  startCommand: >-
    if [ -n "$MONGO_HOST" ]; then
      export ME_CONFIG_MONGODB_URL="mongodb://$MONGO_HOST:$MONGO_PORT/?directConnection=true";
    fi;
    exec tini -- node app

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 50m
          max: 500m
        memory:
          min: 64Mi
          max: 512Mi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /
    port: 8081
    initialDelay: 15s
    interval: 30s
    timeout: 5s
    retries: 3

  smokeTest:
    type: http
    path: /
    expectedStatus: 200
    timeoutSeconds: 30

  auth:
    mode: native
