kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: homarr
  name: Homarr
  description: >
    Modern, drag-and-drop dashboard for your self-hosted stack. 40+
    integrations (Sonarr, qBittorrent, Pi-hole, Uptime Kuma, ...), 10k+
    icons, widgets for weather and system stats. Perfect companion to the
    Flui catalog to collect all your apps in one place.
  appKind: TOOL
  category: dashboards
  tags:
    - dashboard
    - home-page
    - widgets
    - integrations
  license: MIT
  version: "1.59.2"
  maintainedAt: "2026-04-23"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/homarr.svg
  links:
    website: https://homarr.dev
    docs: https://homarr.dev/docs
    source: https://github.com/homarr-labs/homarr
  ratings:
    wow: 5
    utility: 5
    euFit: 4
    community: 5
  alternativeTo:
    - Heimdall
    - Organizr
    - Flame

spec:
  type: standalone
  privatizable: true

  image:
    registry: ghcr.io
    repository: homarr-labs/homarr
    tag: "v1.59.2"

  ports:
    - name: http
      internal: 7575
      expose: true
      protocol: http

  volumes:
    - name: appdata
      mountPath: /appdata
      required: true
      size: 1Gi

  env:
    - name: SECRET_ENCRYPTION_KEY
      valueFrom:
        generate: secret
        length: 64
        format: hex

  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 1Gi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 200m
          max: "2"
        memory:
          min: 384Mi
          max: 2Gi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /
    port: 7575
    interval: 30s
    timeout: 5s
    retries: 3

  domain:
    auto: true
    userCustomizable: true
    tls: true

  auth:
    mode: native
