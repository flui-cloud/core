kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: it-tools
  name: IT-Tools
  description: >
    60+ handy developer tools in the browser: encoders/decoders, JWT parser,
    UUID, hash, cron parser, regex tester, JSON formatter and more. Fully
    client-side, no data ever leaves your server.
  appKind: TOOL
  category: developer-tools
  tags:
    - developer-tools
    - utilities
    - encoder
    - privacy
  license: GPL-3.0
  version: "2024.10"
  maintainedAt: "2026-04-19"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/it-tools.svg
  links:
    website: https://it-tools.tech
    docs: https://github.com/CorentinTh/it-tools
    source: https://github.com/CorentinTh/it-tools
  ratings:
    wow: 3
    utility: 4
    euFit: 5
    community: 4
  alternativeTo:
    - CyberChef
    - dev-tools websites

spec:
  type: standalone
  privatizable: true

  # Project does not publish clean minor tags; latest stable is the dated-sha tag
  # from Oct 2024. Patch-level pin = byte-exact of the verified release.
  image:
    registry: docker.io
    repository: corentinth/it-tools
    tag: "2024.10.22-7ca5933"

  ports:
    - name: http
      internal: 80
      expose: true
      protocol: http

  env: []

  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 300m
      memory: 128Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 50m
          max: 500m
        memory:
          min: 32Mi
          max: 256Mi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /
    port: 80
    interval: 30s
    timeout: 5s
    retries: 3

  domain:
    auto: true
    userCustomizable: true
    tls: true

  auth:
    mode: native
