kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: phpmyadmin
  name: phpMyAdmin
  description: >
    Web admin UI for MariaDB / MySQL. Install on top of a running Flui MariaDB
    building block: credentials are wired from the DB's K8s Secret via
    secretKeyRef and the auth_type=config mode auto-logs in, so the user lands
    directly on the database UI — no login form, no server selector.
  appKind: TOOL
  category: database-tools
  tags:
    - mariadb
    - mysql
    - web-client
    - admin
    - database
  license: GPL-2.0
  version: "5"
  maintainedAt: "2026-04-25"
  clientFor:
    - mariadb
  clientDefaultFor:
    - mariadb
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/phpmyadmin.svg
  links:
    website: https://www.phpmyadmin.net
    docs: https://docs.phpmyadmin.net
    source: https://github.com/phpmyadmin/phpmyadmin
  ratings:
    wow: 3
    utility: 5
    euFit: 4
    community: 5
  alternativeTo:
    - Adminer
    - MySQL Workbench
    - TablePlus

spec:
  type: standalone

  exposure: internal

  image:
    registry: docker.io
    repository: library/phpmyadmin
    tag: "5-apache"

  ports:
    - name: http
      internal: 80
      expose: true
      protocol: http

  env:
    # PMA_ARBITRARY=0 hides the server selector — the user can only reach the
    # DB Flui has wired up via secretKeyRef. Setting both PMA_USER+PMA_PASSWORD
    # at runtime switches phpMyAdmin from cookie auth to config auth → no
    # login form, the user lands directly on the DB UI.
    - name: PMA_ARBITRARY
      value: "0"

  linkedBuildingBlocks:
    - ref: mariadb
      envMapping:
        - name: PMA_HOST
          fromService: host
        - name: PMA_PORT
          fromService: port
        - name: PMA_USER
          fromBBEnv: MARIADB_USER
        - name: PMA_PASSWORD
          fromBBEnv: MARIADB_PASSWORD

  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 384Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 50m
          max: "1"
        memory:
          min: 96Mi
          max: 768Mi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /
    port: 80
    initialDelay: 20s
    interval: 30s
    timeout: 5s
    retries: 3

  auth:
    mode: native
