kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: redis-commander
  name: Redis Commander
  description: >
    Lightweight web-based key browser for Valkey (and Redis). Install on top of a
    running Flui Valkey building block: credentials flow from the BB's
    K8s Secret via secretKeyRef, they never pass through the dashboard.
  appKind: TOOL
  category: database-tools
  tags:
    - valkey
    - redis
    - web-client
    - admin
    - key-value
  license: MIT
  version: "0.9"
  maintainedAt: "2026-04-22"
  clientFor:
    - valkey
  clientDefaultFor:
    - valkey
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/redis-commander.svg
  links:
    website: https://joeferner.github.io/redis-commander/
    docs: https://github.com/joeferner/redis-commander/blob/master/docs/configuration.md
    source: https://github.com/joeferner/redis-commander
  ratings:
    wow: 3
    utility: 5
    euFit: 4
    community: 4
  alternativeTo:
    - RedisInsight
    - Redis Desktop Manager

spec:
  type: standalone
  privatizable: true

  # redis-commander is an admin tool for Valkey: it should never be on the
  # public internet. Default it to internal exposure — the user reaches it
  # only from the Flui dashboard via the ForwardAuth proxy. No Ingress, no
  # public DNS, no certificate issued for it.
  exposure: internal

  image:
    registry: ghcr.io
    repository: joeferner/redis-commander
    tag: "0.9.1"

  ports:
    - name: http
      internal: 8081
      expose: true
      protocol: http

  env:
    - name: PORT
      value: "8081"

  # REDIS_HOST / REDIS_PORT / REDIS_PASSWORD are injected by the backend at
  # install time via `linkedBuildingBlock.envMapping`. The password rides
  # secretKeyRef → the pod reads it from Valkey's K8s Secret at start; Flui
  # never holds the plaintext.
  linkedBuildingBlocks:
    - ref: valkey
      envMapping:
        - name: REDIS_HOST
          fromService: host
        - name: REDIS_PORT
          fromService: port
        - name: REDIS_PASSWORD
          fromBBEnv: VALKEY_PASSWORD

  # No startCommand needed: redis-commander reads REDIS_HOST / REDIS_PORT /
  # REDIS_PASSWORD as native env vars from its own entrypoint. When the BB is
  # not yet linked those vars are absent → it falls back to localhost:6379,
  # shows a connection error in the UI, but the HTTP server on :8081 stays up.

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 50m
          max: 500m
        memory:
          min: 64Mi
          max: 512Mi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /
    port: 8081
    interval: 30s
    timeout: 5s
    retries: 3

  auth:
    mode: native
