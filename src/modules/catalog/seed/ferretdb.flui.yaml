kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: ferretdb
  name: FerretDB
  draft: true
  description: >
    MongoDB-compatible proxy that stores data in PostgreSQL. 100% open source
    (Apache 2.0) alternative to MongoDB — use existing MongoDB drivers and
    tools without SSPL. Requires a Flui PostgreSQL building block as its
    backend storage. Recommended for stacks that need document-oriented
    queries on a fully OSI-approved stack.
  appKind: DATABASE
  category: database
  tags:
    - database
    - document-db
    - mongodb-compatible
    - building-block
    - open-source
  license: Apache-2.0
  version: "1"
  maintainedAt: "2026-04-24"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/ferretdb.svg
  links:
    website: https://www.ferretdb.com
    docs: https://docs.ferretdb.io
    source: https://github.com/FerretDB/FerretDB

spec:
  type: building-block

  image:
    registry: ghcr.io
    repository: ferretdb/ferretdb
    tag: "1"

  ports:
    - name: mongodb
      internal: 27017
      expose: false
      protocol: tcp

  dependencies:
    - ref: postgresql
      as: postgres
      required: true
      reuseExisting: true

  env:
    - name: FERRETDB_POSTGRESQL_URL
      value: "postgres://{{deps.postgres.env.POSTGRES_USER}}:{{deps.postgres.env.POSTGRES_PASSWORD}}@{{deps.postgres.host}}:{{deps.postgres.port}}/{{deps.postgres.env.POSTGRES_DB}}"
      description: Full PostgreSQL connection URL used as FerretDB backend storage

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 100m
          max: "2"
        memory:
          min: 128Mi
          max: 1Gi
      updatePolicy:
        trigger:
          - OOMKilled
          - CPUThrottling
        cooldown: 5m

  healthcheck:
    type: tcp
    port: 27017
    initialDelay: 10s
    interval: 10s
    timeout: 5s
    retries: 5

  smokeTest:
    type: tcp
    port: 27017
    timeoutSeconds: 20

  auth:
    mode: none
