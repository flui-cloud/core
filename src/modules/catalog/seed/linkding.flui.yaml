kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: linkding
  name: Linkding
  description: >
    Minimalist bookmark manager with tags, full-text search and browser
    extensions. SQLite-backed, incredibly lightweight (runs happily with
    50MB of RAM), and built with keyboard-first navigation.
  appKind: APPLICATION
  category: productivity
  tags:
    - bookmarks
    - read-later
    - privacy
    - minimalist
  license: MIT
  version: "1.45.0"
  maintainedAt: "2026-04-23"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/linkding.svg
  links:
    website: https://linkding.link
    docs: https://linkding.link/installation
    source: https://github.com/sissbruecker/linkding
  ratings:
    wow: 4
    utility: 5
    euFit: 5
    community: 4
  alternativeTo:
    - Raindrop.io
    - Pocket
    - Pinboard

spec:
  type: standalone
  privatizable: true

  image:
    registry: docker.io
    repository: sissbruecker/linkding
    tag: "1.45.0"

  ports:
    - name: http
      internal: 9090
      expose: true
      protocol: http

  volumes:
    - name: data
      mountPath: /etc/linkding/data
      required: true
      size: 1Gi

  env:
    - name: LD_SUPERUSER_NAME
      valueFrom:
        userInput:
          label: Admin username
          default: admin
          pattern: "^[a-zA-Z0-9_]{3,32}$"
          patternDescription: Letters, numbers and underscores, 3-32 chars
          minLength: 3
          maxLength: 32
          format: text
      description: Username of the initial superuser (only used on first boot)
    - name: LD_SUPERUSER_PASSWORD
      valueFrom:
        userInput:
          label: Admin password
          sensitive: true
          pattern: "^.{12,128}$"
          patternDescription: At least 12 characters
          minLength: 12
          maxLength: 128
          confirm: true
          format: password
      description: Password for the initial superuser. Flui does not store or log this value; if you lose it, reset from the Linkding admin UI or reinstall.

  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 100m
          max: "1"
        memory:
          min: 192Mi
          max: 1Gi
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /health
    port: 9090
    interval: 30s
    timeout: 5s
    retries: 3

  domain:
    auto: true
    userCustomizable: true
    tls: true

  auth:
    mode: native
