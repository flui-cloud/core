kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: minio
  name: MinIO
  description: >
    S3-compatible object storage you run on your own EU server. Store files,
    backups, and static assets without sending data to AWS. Includes a built-in
    web console on port 9001. Used as a building block by apps that need blob
    or object storage (Nextcloud, Immich, backups, etc.).
  appKind: APPLICATION
  category: storage
  tags:
    - storage
    - object-storage
    - s3-compatible
    - building-block
    - gdpr
  license: AGPL-3.0
  version: "RELEASE.2025-04-08"
  maintainedAt: "2026-04-22"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/minio.svg
  links:
    website: https://min.io
    docs: https://min.io/docs/minio/container/index.html
    source: https://github.com/minio/minio
  ratings:
    wow: 4
    utility: 5
    euFit: 5
    community: 4
  alternativeTo:
    - AWS S3
    - Google Cloud Storage
    - Backblaze B2

spec:
  type: building-block

  image:
    registry: docker.io
    repository: minio/minio
    tag: "RELEASE.2025-04-08T15-41-24Z"

  # Pin the console to a fixed port so the K8s Service can target it reliably.
  startCommand: minio server /data --console-address ":9001"

  ports:
    - name: s3
      internal: 9000
      expose: false
      protocol: tcp
    - name: console
      internal: 9001
      expose: false
      protocol: http

  volumes:
    - name: data
      mountPath: /data
      required: true
      size: 20Gi

  env:
    - name: MINIO_ROOT_USER
      valueFrom:
        userInput:
          label: Admin username
          default: minioadmin
          pattern: "^[a-zA-Z0-9_-]{3,32}$"
          patternDescription: Letters, numbers, hyphens and underscores, 3-32 chars
          minLength: 3
          maxLength: 32
          format: text
    - name: MINIO_ROOT_PASSWORD
      valueFrom:
        userInput:
          label: Admin password
          sensitive: true
          pattern: "^.{8,128}$"
          patternDescription: At least 8 characters
          minLength: 8
          maxLength: 128
          confirm: true
          format: password

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 100m
          max: "4"
        memory:
          min: 256Mi
          max: 8Gi
      updatePolicy:
        trigger:
          - OOMKilled
          - CPUThrottling
        cooldown: 10m

  healthcheck:
    type: http
    path: /minio/health/live
    port: 9000
    initialDelay: 10s
    interval: 30s
    timeout: 5s
    retries: 3

  auth:
    mode: native
