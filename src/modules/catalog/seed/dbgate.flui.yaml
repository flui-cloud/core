kind: CatalogApp
apiVersion: flui/v1

metadata:
  id: dbgate
  name: DbGate
  description: >
    Universal web-based database client with native support for MariaDB,
    MySQL, PostgreSQL, MongoDB, Redis, SQLite, MSSQL and more. Use it to
    connect to your own external databases (on-prem, another cloud, dev
    machine). The user adds connections manually from the DbGate UI;
    credentials are stored in DbGate's own local config volume. Does NOT
    auto-connect to Flui-managed databases — Flui never exposes the
    credentials of building blocks like MariaDB or PostgreSQL outside
    the cluster.
  appKind: TOOL
  category: database-tools
  tags:
    - mariadb
    - mysql
    - postgres
    - redis
    - valkey
    - mongodb
    - sqlite
    - mssql
    - web-client
    - admin
    - multi-db
  license: GPL-3.0
  version: "7-beta"
  maintainedAt: "2026-04-25"
  icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/dbgate.svg
  links:
    website: https://dbgate.io
    docs: https://docs.dbgate.io
    source: https://github.com/dbgate/dbgate
  ratings:
    wow: 5
    utility: 5
    euFit: 4
    community: 4
  alternativeTo:
    - DBeaver
    - phpMyAdmin
    - pgAdmin
    - RedisInsight
    - TablePlus

spec:
  type: standalone

  exposure: internal

  image:
    registry: docker.io
    repository: dbgate/dbgate
    tag: "beta-alpine"

  ports:
    - name: http
      internal: 3000
      expose: true
      protocol: http

  volumes:
    - name: data
      mountPath: /root/.dbgate
      required: true
      size: 1Gi

  env:
    # The dashboard already gates DbGate behind ForwardAuth on the internal
    # wildcard. DbGate's own auth layer would be a second login the user
    # cannot satisfy — skip it. Without SKIP_ALL_AUTH=1 the SPA fails to
    # initialize and logs "API disabled!! / API not initialized correctly".
    # SKIP_ALL_AUTH is only available on the `beta` channel until it lands
    # in a stable 7.x release.
    - name: SKIP_ALL_AUTH
      value: "true"

  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 750m
      memory: 512Mi

  scaling:
    horizontal:
      enabled: false
    vertical:
      enabled: true
      mode: Recreate
      bounds:
        cpu:
          min: 100m
          max: "1"
        memory:
          min: 192Mi
          max: "1Gi"
      updatePolicy:
        trigger:
          - OOMKilled
        cooldown: 5m

  healthcheck:
    type: http
    path: /
    port: 3000
    initialDelay: 20s
    interval: 30s
    timeout: 5s
    retries: 3

  auth:
    mode: native
